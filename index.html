<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมเนื้อเรื่อง - มีระบบ Login & Scoreboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-card">
        
        <!-- 1. หน้า LOGIN -->
        <div id="login-screen" class="screen">
            <h1 class="game-title">🕯️ ปริศนาคฤหาสน์ร้าง</h1>
            <p style="text-align: center; color: #8b949e;">กรอกชื่อผู้เล่นเพื่อเข้าสู่เกม</p>
            <input type="text" id="username-input" placeholder="พิมพ์ชื่อของคุณที่นี่..." maxlength="15">
            <button id="start-btn" onclick="startGame()">เริ่มเล่นเกม</button>
        </div>

        <!-- 2. หน้าเล่นเกม -->
        <div id="game-screen" class="screen hidden">
            <div class="user-bar">ผู้เล่น: <span id="player-display"></span></div>
            <div id="story-text" class="story-box">กำลังโหลด...</div>
            <div id="choice-buttons" class="choices-box"></div>
        </div>

        <!-- 3. หน้า SCOREBOARD (แสดงเมื่อเล่นจบ) -->
        <div id="score-screen" class="screen hidden">
            <h2 class="game-title">🏆 กระดานคะแนน (Leaderboard)</h2>
            <p id="final-result" class="result-text"></p>
            
            <div class="scoreboard">
                <div class="score-header">
                    <span>อันดับ / ชื่อผู้เล่น</span>
                    <span>ฉากจบที่ได้</span>
                </div>
                <div id="score-list">กำลังโหลดคะแนน...</div>
            </div>

            <button onclick="restartGame()" style="margin-top: 20px;">🔄 เล่นใหม่อีกครั้ง</button>
        </div>

    </div>

    <!-- Firebase SDK (สำหรับบันทึกและดึงข้อมูลเรียลไทม์) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <!-- เชื่อมต่อไฟล์ JS ของเรา -->
    <script src="script.js"></script>
</body>
</html>
